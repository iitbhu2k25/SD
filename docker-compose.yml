
services:
  frontend:
    build:
      context: ./frontend/
      dockerfile: dockerfile.frontend 
    image: frontend:latest
    ports:
      - "3100:3000"
    volumes:
      - ./frontend:/home/app:z
    command: npm start

  database:
    image: postgres:16
    ports:
      - "5450:5432"
    env_file:
      - ./database/.db.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:z
    restart: always
    depends_on:
      - redis
      - geoserver
  backend:
    build:
      context: ./backend/
      dockerfile: docker/dockerfile.backend
    image: backend:latest
    ports:
      - "9200:9000"
    env_file:
      - .env
    volumes:
      - ./backend:/home/app:z
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 9000 --proxy-headers main.asgi:application"
    restart: always
    depends_on:
      - database
      - geoserver
    
  redis_django:
    image: redis:7.4
    ports:
      - "6370:6379"
    expose:
      - "6370"
    env_file:
      - .env
    restart: always
    volumes:
      - redis_django_data:/data 

  celery_django:
    build:
      context: ./backend/
      dockerfile: docker/dockerfile.backend
    image: celery_django:latest
    volumes:
      - ./backend:/home/app:z
    env_file:
      - .env
    depends_on:
      - redis_django
      - backend
    command:
      - /bin/sh
      - -c
      - |
        celery -A main worker --loglevel=info -c 4 --pool=prefork --max-tasks-per-child=50


  fast_m:
    build:
      context: ./fast_m
      dockerfile: Dockerfile
    image: fast_m:latest
    ports:
      - "6500:6500"
    env_file:
      - .fastmdb.env
    volumes:
      - ./fast_m:/home/app:z
    command: uvicorn app.main:app --host 0.0.0.0 --port 6500 --reload
    restart: always
    depends_on:
      - database
      - geoserver     
    


  fast_backend:
    build:
      context: ./fast_backend
      dockerfile: Dockerfile
    image: backend_fast:latest
    ports:
      - "7000:7000"
    env_file:
      - ./fast_backend/.fastdb.env
    volumes:
      - ./fast_backend:/home/app:z

    #command: gunicorn app.main:app --config gunicorn.conf.py --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 7000 --reload 
    restart: always
    depends_on:
      - database
      - geoserver


  redis:
    image: redis:7.4
    ports:
      - "6379:6379"
    expose:
      - "6379"
    env_file:
      - ./fast_backend/.fastdb.env
    restart: always
    volumes:
      - redis_data:/data 

  celery_low:
    build:
      context: ./fast_backend
      dockerfile: Dockerfile
    image: celery_low:latest
    volumes:
      - ./fast_backend:/home/app:z 
    depends_on:
      - redis
      - fast_backend
      - geoserver
    command:  
      - /bin/sh
      - -c
      - |
        celery -A app.conf.celery worker -n low_worker -c 2 --pool=prefork   --autoscale=4,2

    env_file:
      - ./fast_backend/.fastdb.env

  # celery_high:
