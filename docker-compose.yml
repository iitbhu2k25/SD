  database:
    image: postgres:16
    ports:
      - "5450:5432"
    env_file:
      - ./database/.db.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:z
    restart: always
    depends_on:
      - redis
      - geoserver
