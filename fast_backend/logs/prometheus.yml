global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  # ----------------------------------------------------------
  #  Celery Worker Metrics (via celery-exporter / flower / custom exporter)
  # ----------------------------------------------------------
  - job_name: "celery-workers"
    static_configs:
      - targets:
          - "celery_exporter:9808"

  # ----------------------------------------------------------
  # Redis metrics
  # ----------------------------------------------------------
  - job_name: "redis"
    static_configs:
      - targets: [ "redis_exporter:9121" ]

  # ----------------------------------------------------------
  # Node system metrics (CPU, RAM, Disk, etc.)
  # ----------------------------------------------------------
  - job_name: "node-exporter"
    static_configs:
      - targets: [ "node_exporter:9100" ]

  # ----------------------------------------------------------
  # FastAPI application metrics (if PrometheusMiddleware enabled)
  # ----------------------------------------------------------
  # - job_name: "fastapi"
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: [ "fast_backend:7000" ]

  # ----------------------------------------------------------
  # Traefik metrics (if enabled)
  # ----------------------------------------------------------
  # - job_name: "traefik"
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: [ "traefik:8082" ]
